name: test

on:
  push:
  pull_request:

jobs:
  synthetic-tests:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node tests/run-all.mjs
      - if: runner.os == 'Linux'
        run: ./install.sh --help
      - if: runner.os == 'Windows'
        shell: pwsh
        run: .\install.ps1 --help
